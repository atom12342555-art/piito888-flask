<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ไฟล์ลับ</title>
    <style>
        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
        }
        h1 {
            font-size: 8vw;
            color: red;
            text-align: center;
            text-shadow: 2px 2px 10px black;
            z-index: 10;
            position: relative;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* ป้องกันการกดหยุดคลิป */
        }
    </style>
</head>
<body>

    <!-- ข้อความขึ้นทันทีที่เปิดเว็บ -->
    <h1>เปิดหาพ่อมึง</h1>

    <!-- วิดีโอเล่นทันที แต่ถูกบังคับปิดเสียง (mute=1) เพื่อให้ Browser ยอมให้เล่น -->
    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&controls=0" allow="autoplay; encrypted-media"></iframe>

</body>
</html>
